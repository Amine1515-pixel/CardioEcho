<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CardioEcho — 50 Cas Cliniques d'Entraînement</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #06101E; --bg-card: #0B1928; --bg-elevated: #122537;
  --border: rgba(255,255,255,0.08); --border-soft: rgba(255,255,255,0.04);
  --text-primary: #EEF5FF; --text-secondary: #94A3B8; --text-muted: #64748B;
  --accent: #4A90E2; --accent-2: #7C3AED; --accent-3: #14B8A6;
  --success: #10B981; --warning: #F59E0B; --danger: #EF4444;
  --gradient-1: linear-gradient(135deg, #4A90E2 0%, #7C3AED 100%);
  --gradient-2: linear-gradient(135deg, #14B8A6 0%, #4A90E2 100%);
}
html, body {
  background: radial-gradient(ellipse at top, #1A2D4D 0%, #06101E 60%);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
  font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased;
  min-height: 100vh; overflow-x: hidden;
}
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 16px 16px 60px; }

/* HEADER */
.header {
  display: flex; align-items: center; gap: 10px; padding: 8px 0 14px;
  border-bottom: 1px solid var(--border-soft); margin-bottom: 14px;
}
.btn-back {
  background: var(--bg-elevated); border: 1px solid var(--border);
  color: var(--text-primary); padding: 7px 11px; border-radius: 8px;
  font-size: 12px; font-family: inherit; cursor: pointer; font-weight: 700;
}
.brand-mid { flex: 1; text-align: center; }
.brand-name {
  font-size: 17px; font-weight: 800; letter-spacing: -0.4px;
  background: var(--gradient-1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-tag { font-size: 10px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.5px; text-transform: uppercase; }

/* SCREENS */
.screen { display: none; animation: screenIn 0.25s ease-out; }
.screen.active { display: block; }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.screen-title {
  font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.screen-subtitle {
  font-size: 12.5px; color: var(--text-secondary);
  margin-bottom: 18px; line-height: 1.5;
}

/* STATS BANNER (écran liste) */
.stats-banner {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 11px; padding: 10px 8px; text-align: center;
}
.stat-value {
  font-size: 18px; font-weight: 800;
  background: var(--gradient-1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-label {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; font-weight: 600;
}

/* SEARCH BAR */
.search-bar {
  position: relative; margin-bottom: 12px;
}
.search-input {
  width: 100%; padding: 11px 12px 11px 36px;
  background: var(--bg-card); border: 1.5px solid var(--border);
  color: var(--text-primary); border-radius: 11px;
  font-size: 14px; font-family: inherit; -webkit-appearance: none;
}
.search-input:focus { outline: none; border-color: var(--accent); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); pointer-events: none;
}

/* FILTER CHIPS */
.filter-section { margin-bottom: 14px; }
.filter-label {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 700; margin-bottom: 6px;
}
.filter-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.chip {
  background: var(--bg-elevated); border: 1px solid var(--border);
  color: var(--text-secondary); padding: 5px 11px; border-radius: 14px;
  font-size: 11.5px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all 0.18s;
}
.chip:active { transform: scale(0.95); }
.chip.active {
  background: var(--accent); color: white; border-color: var(--accent);
}
.chip.diff-easy.active { background: var(--success); border-color: var(--success); }
.chip.diff-medium.active { background: var(--warning); border-color: var(--warning); color: #1F2937; }
.chip.diff-hard.active { background: var(--danger); border-color: var(--danger); }

/* CASE LIST */
.case-list-empty {
  text-align: center; padding: 30px 16px;
  color: var(--text-muted); font-size: 13px;
}
.case-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 13px; margin-bottom: 9px;
  display: flex; align-items: center; gap: 11px; cursor: pointer;
  transition: all 0.18s;
  position: relative; overflow: hidden;
}
.case-card:active { transform: scale(0.98); }
.case-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; background: var(--accent);
}
.case-card.diff-easy::before { background: var(--success); }
.case-card.diff-medium::before { background: var(--warning); }
.case-card.diff-hard::before { background: var(--danger); }
.case-card-num {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--bg-elevated); display: flex;
  align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: var(--accent);
  flex-shrink: 0;
}
.case-card.completed .case-card-num { background: var(--success); color: white; }
.case-card-info { flex: 1; min-width: 0; }
.case-card-title {
  font-size: 13px; font-weight: 700; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.case-card-meta {
  font-size: 10.5px; color: var(--text-muted); display: flex;
  gap: 8px; align-items: center; flex-wrap: wrap;
}
.case-card-meta .badge {
  font-size: 9.5px; padding: 1px 6px; border-radius: 4px;
  font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
}
.badge.age-neonate { background: rgba(236,72,153,0.15); color: #F472B6; }
.badge.age-nourrisson { background: rgba(124,58,237,0.15); color: var(--accent-2); }
.badge.age-enfant { background: rgba(20,184,166,0.15); color: var(--accent-3); }
.badge.age-grand { background: rgba(245,158,11,0.15); color: var(--warning); }
.badge.diff-easy { background: rgba(16,185,129,0.15); color: var(--success); }
.badge.diff-medium { background: rgba(245,158,11,0.15); color: var(--warning); }
.badge.diff-hard { background: rgba(239,68,68,0.15); color: var(--danger); }
.case-card-arrow {
  font-size: 16px; color: var(--text-muted); flex-shrink: 0;
}

/* CASE DETAIL */
.case-header {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 12px;
}
.case-header-top {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.case-header-num {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--gradient-1); color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800;
}
.case-header-title {
  flex: 1; font-size: 14px; font-weight: 800;
}
.case-header-badges { display: flex; gap: 6px; flex-wrap: wrap; }

/* MODE SELECTOR */
.mode-selector {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
  margin-bottom: 14px;
}
.mode-btn {
  background: var(--bg-card); border: 1.5px solid var(--border);
  color: var(--text-secondary); padding: 9px 6px; border-radius: 10px;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit;
  text-align: center; transition: all 0.18s;
}
.mode-btn:active { transform: scale(0.96); }
.mode-btn.active {
  background: var(--accent); color: white; border-color: var(--accent);
}
.mode-btn .mode-icon { display: block; font-size: 16px; margin-bottom: 2px; }

/* CARD GENERIQUE */
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px; margin-bottom: 11px;
}
.card-title {
  font-size: 11px; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.6px;
  font-weight: 800; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.card-content { font-size: 13px; line-height: 1.6; color: var(--text-primary); }
.card-content p { margin-bottom: 6px; }
.card-content strong { color: var(--accent); font-weight: 700; }

/* CANVA URL INPUT */
.canva-url-row {
  display: flex; gap: 6px; margin-bottom: 8px;
}
.canva-url-input {
  flex: 1; min-width: 0; background: var(--bg-elevated);
  border: 1.5px solid var(--border); color: var(--text-primary);
  padding: 9px 11px; border-radius: 9px; font-size: 11.5px;
  font-family: 'SF Mono', Menlo, monospace; -webkit-appearance: none;
}
.canva-url-input:focus { outline: none; border-color: var(--accent); }
.canva-btn {
  background: var(--accent); color: white; border: none;
  padding: 9px 12px; border-radius: 9px; font-size: 12px;
  font-weight: 700; cursor: pointer; font-family: inherit; flex-shrink: 0;
}
.canva-btn.secondary {
  background: var(--bg-elevated); color: var(--text-secondary);
  border: 1px solid var(--border);
}
.canva-help {
  font-size: 10.5px; color: var(--text-muted); line-height: 1.5;
  background: rgba(74,144,226,0.06); border-left: 2px solid var(--accent);
  padding: 7px 10px; border-radius: 0 7px 7px 0; margin-bottom: 8px;
}
.canva-iframe-wrap {
  position: relative; width: 100%; padding-bottom: 75%;
  background: var(--bg-elevated); border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden;
}
.canva-iframe-wrap iframe {
  position: absolute; inset: 0; width: 100%; height: 100%;
  border: 0;
}
.canva-empty-placeholder {
  background: var(--bg-elevated); border: 2px dashed var(--border);
  border-radius: 10px; padding: 28px 16px; text-align: center;
  color: var(--text-muted);
}
.canva-empty-placeholder .icon { font-size: 28px; margin-bottom: 8px; }

/* QCM */
.qcm-options { display: flex; flex-direction: column; gap: 8px; }
.qcm-option {
  background: var(--bg-elevated); border: 1.5px solid var(--border);
  color: var(--text-primary); padding: 11px 13px; border-radius: 10px;
  font-size: 13px; font-family: inherit; text-align: left;
  cursor: pointer; transition: all 0.18s; display: flex; align-items: center; gap: 9px;
}
.qcm-option:active { transform: scale(0.98); }
.qcm-option:hover { border-color: var(--accent); }
.qcm-option-letter {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 12px; flex-shrink: 0;
}
.qcm-option.selected { border-color: var(--accent); background: rgba(74,144,226,0.10); }
.qcm-option.selected .qcm-option-letter { background: var(--accent); color: white; border-color: var(--accent); }
.qcm-option.correct { border-color: var(--success); background: rgba(16,185,129,0.10); }
.qcm-option.correct .qcm-option-letter { background: var(--success); color: white; border-color: var(--success); }
.qcm-option.wrong { border-color: var(--danger); background: rgba(239,68,68,0.10); }
.qcm-option.wrong .qcm-option-letter { background: var(--danger); color: white; border-color: var(--danger); }
.qcm-option:disabled { cursor: default; }

/* FREE TEXT */
.free-input {
  width: 100%; min-height: 80px; padding: 11px 13px;
  background: var(--bg-elevated); border: 1.5px solid var(--border);
  color: var(--text-primary); border-radius: 10px;
  font-size: 14px; font-family: inherit; resize: vertical;
  -webkit-appearance: none;
}
.free-input:focus { outline: none; border-color: var(--accent); }

/* WORKFLOW STEPS */
.workflow-step-indicator {
  display: flex; gap: 4px; margin-bottom: 12px;
}
.workflow-step-dot {
  flex: 1; height: 4px; background: var(--border); border-radius: 2px;
  transition: background 0.2s;
}
.workflow-step-dot.active { background: var(--accent); }
.workflow-step-dot.done { background: var(--success); }

/* ANSWER REVEAL */
.reveal-card {
  background: linear-gradient(135deg, rgba(16,185,129,0.10), transparent);
  border: 1.5px solid var(--success); border-radius: 12px;
  padding: 13px; margin-bottom: 12px;
  animation: revealIn 0.4s ease-out;
}
@keyframes revealIn {
  from { opacity: 0; transform: scale(0.96); }
  to { opacity: 1; transform: scale(1); }
}
.reveal-card.wrong-card {
  background: linear-gradient(135deg, rgba(239,68,68,0.10), transparent);
  border-color: var(--danger);
}
.reveal-title {
  font-size: 12px; font-weight: 800; color: var(--success);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
}
.reveal-card.wrong-card .reveal-title { color: var(--danger); }
.reveal-content { font-size: 13px; line-height: 1.6; }
.reveal-content strong { color: var(--accent); }

/* BUTTONS */
.btn {
  width: 100%; padding: 12px; background: var(--gradient-1);
  color: white; border: none; border-radius: 11px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all 0.18s;
  box-shadow: 0 6px 16px rgba(74,144,226,0.30);
}
.btn:active { transform: scale(0.98); }
.btn-secondary {
  background: var(--bg-elevated); color: var(--text-primary);
  border: 1px solid var(--border); box-shadow: none;
}
.btn-success { background: linear-gradient(135deg, #10B981, #059669); box-shadow: 0 6px 16px rgba(16,185,129,0.30); }
.btn-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px;
}

/* TOAST */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  background: var(--success); color: white; padding: 10px 18px;
  border-radius: 9px; font-size: 13px; font-weight: 700;
  z-index: 99999; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  animation: toastIn 0.3s ease-out;
}
.toast.error { background: var(--danger); }
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, -10px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

@supports (-webkit-touch-callout: none) {
  .canva-url-input, .free-input, .search-input { font-size: 16px; }
}
</style>
</head>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <button class="btn-back" id="btnBack" onclick="onBack()">← Retour</button>
    <div class="brand-mid">
      <div class="brand-name">📚 Cas Cliniques</div>
      <div class="brand-tag" id="headerTag">50 cas d'entraînement</div>
    </div>
    <div style="width:60px;"></div>
  </div>

  <!-- ━━━ ÉCRAN LISTE ━━━ -->
  <section class="screen active" id="screen-list">
    <h1 class="screen-title">Bibliothèque de cas</h1>
    <p class="screen-subtitle">50 cas pédagogiques basés sur la cohorte CMCI. Filtrez par pathologie, âge ou difficulté.</p>

    <div class="stats-banner">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">50</div>
        <div class="stat-label">Cas totaux</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDone">0</div>
        <div class="stat-label">Complétés</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSuccess">—</div>
        <div class="stat-label">Réussite</div>
      </div>
    </div>

    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Rechercher (CIV, T4F, cyanose...)">
    </div>

    <div class="filter-section">
      <div class="filter-label">Pathologie</div>
      <div class="filter-chips" id="filterPatho">
        <button class="chip active" data-filter-patho="all">Toutes</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Tranche d'âge</div>
      <div class="filter-chips" id="filterAge">
        <button class="chip active" data-filter-age="all">Tous</button>
        <button class="chip" data-filter-age="neonate">👶 0-1m</button>
        <button class="chip" data-filter-age="nourrisson">🍼 1-6m</button>
        <button class="chip" data-filter-age="enfant">🧒 6m-5a</button>
        <button class="chip" data-filter-age="grand">🧑 >5a</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Difficulté</div>
      <div class="filter-chips" id="filterDiff">
        <button class="chip active" data-filter-diff="all">Toutes</button>
        <button class="chip diff-easy" data-filter-diff="easy">Facile</button>
        <button class="chip diff-medium" data-filter-diff="medium">Moyen</button>
        <button class="chip diff-hard" data-filter-diff="hard">Difficile</button>
      </div>
    </div>

    <div id="caseList"></div>
  </section>

  <!-- ━━━ ÉCRAN CAS DÉTAIL ━━━ -->
  <section class="screen" id="screen-case">
    <div id="caseDetail"></div>
  </section>

</div>

<script>

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
const CASES_DATA = [

  {

    qcm_options: [

/* Initialisation des filtres patho */
function initPathoFilter() {
  const container = document.getElementById('filterPatho');
  PATHO_LIST.forEach(p => {
    const count = CASES_DATA.filter(c => c.patho === p.id).length;
    if (count === 0) return;
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.filterPatho = p.id;
    btn.innerHTML = p.label + ' <span style="opacity:0.6;font-size:10px;">(' + count + ')</span>';
    btn.onclick = () => setFilter('patho', p.id);
    container.appendChild(btn);
  });
}

/* Activation d'un filtre */
function setFilter(type, value) {
  filters[type] = value;
  // Mettre à jour visuel
  document.querySelectorAll('[data-filter-' + type + ']').forEach(b => {
    b.classList.toggle('active', b.dataset['filter' + type.charAt(0).toUpperCase() + type.slice(1)] === value);
  });
  renderCaseList();
}

/* Initialisation des écouteurs */
function initFilters() {
  // Filtres âge et diff (déjà dans HTML)
  document.querySelectorAll('[data-filter-age]').forEach(b => {
    b.onclick = () => setFilter('age', b.dataset.filterAge);
  });
  document.querySelectorAll('[data-filter-diff]').forEach(b => {
    b.onclick = () => setFilter('diff', b.dataset.filterDiff);
  });
  // Filtre patho "all"
  document.querySelector('[data-filter-patho="all"]').onclick = () => setFilter('patho', 'all');
  // Recherche
  document.getElementById('searchInput').addEventListener('input', e => {
    filters.search = e.target.value.toLowerCase().trim();
    renderCaseList();
  });
}

/* Rendu de la liste filtrée */
function renderCaseList() {
  const filtered = CASES_DATA.filter(c => {
    if (filters.patho !== 'all' && c.patho !== filters.patho) return false;
    if (filters.age !== 'all' && c.age !== filters.age) return false;
    if (filters.diff !== 'all' && c.diff !== filters.diff) return false;
    if (filters.search) {
      const blob = (c.title + ' ' + c.patho + ' ' + c.presentation + ' ' + c.correct_dx).toLowerCase();
      if (!blob.includes(filters.search)) return false;
    }
    return true;
  });

  // Stats
  const progress = getProgress();
  const completedCount = Object.keys(progress).filter(id => progress[id].completed).length;
  const successCount = Object.keys(progress).filter(id => progress[id].success).length;
  document.getElementById('statTotal').textContent = CASES_DATA.length;
  document.getElementById('statDone').textContent = completedCount;
  document.getElementById('statSuccess').textContent = completedCount > 0 ? Math.round(successCount / completedCount * 100) + '%' : '—';

  const list = document.getElementById('caseList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="case-list-empty">🔍 Aucun cas ne correspond aux filtres.<br><small>Essayez d\'élargir vos critères.</small></div>';
    return;
  }

  let html = '';
  filtered.forEach(c => {
    const isCompleted = progress[c.id] && progress[c.id].completed;
    const ageLabel = { neonate: '0-1m', nourrisson: '1-6m', enfant: '6m-5a', grand: '>5a' }[c.age];
    const diffLabel = { easy: 'Facile', medium: 'Moyen', hard: 'Difficile' }[c.diff];
    html += '<div class="case-card diff-' + c.diff + (isCompleted ? ' completed' : '') + '" onclick="openCase(' + c.id + ')">';
    html += '<div class="case-card-num">' + (isCompleted ? '✓' : c.id) + '</div>';
    html += '<div class="case-card-info">';
    html += '<div class="case-card-title">' + escapeHtml(c.title) + '</div>';
    html += '<div class="case-card-meta">';
    html += '<span class="badge age-' + c.age + '">' + ageLabel + '</span>';
    html += '<span class="badge diff-' + c.diff + '">' + diffLabel + '</span>';
    html += '<span>' + c.patho + ' · ' + c.age_label + '</span>';
    html += '</div></div>';
    html += '<div class="case-card-arrow">›</div>';
    html += '</div>';
  });
  list.innerHTML = html;
}

/* ━━━ OUVERTURE D'UN CAS ━━━ */
function openCase(id) {
  currentCaseId = id;
  currentMode = 'workflow';
  workflowStep = 0;
  goTo('case');
  renderCaseDetail();
}

/* ━━━ AFFICHAGE D'UN CAS ━━━ */
function renderCaseDetail() {
  const c = CASES_DATA.find(x => x.id === currentCaseId);
  if (!c) { goTo('list'); return; }
  const container = document.getElementById('caseDetail');

  const ageLabel = { neonate: '0-1m', nourrisson: '1-6m', enfant: '6m-5a', grand: '>5a' }[c.age];
  const diffLabel = { easy: 'Facile', medium: 'Moyen', hard: 'Difficile' }[c.diff];

  let html = '';

  // Header
  html += '<div class="case-header">';
  html += '<div class="case-header-top">';
  html += '<div class="case-header-num">#' + c.id + '</div>';
  html += '<div class="case-header-title">' + escapeHtml(c.title) + '</div>';
  html += '</div>';
  html += '<div class="case-header-badges">';
  html += '<span class="badge age-' + c.age + '">' + ageLabel + ' · ' + c.age_label + '</span>';
  html += '<span class="badge diff-' + c.diff + '">' + diffLabel + '</span>';
  html += '<span class="badge" style="background:rgba(255,255,255,0.08);color:var(--text-secondary);">Sexe : ' + (c.sex === 'M' ? 'M' : 'F') + '</span>';
  html += '</div>';
  html += '</div>';

  // Sélecteur de mode
  html += '<div class="mode-selector">';
  html += '<button class="mode-btn ' + (currentMode === 'workflow' ? 'active' : '') + '" onclick="switchMode(\'workflow\')"><span class="mode-icon">🎯</span>Workflow</button>';
  html += '<button class="mode-btn ' + (currentMode === 'qcm' ? 'active' : '') + '" onclick="switchMode(\'qcm\')"><span class="mode-icon">🧠</span>QCM</button>';
  html += '<button class="mode-btn ' + (currentMode === 'libre' ? 'active' : '') + '" onclick="switchMode(\'libre\')"><span class="mode-icon">📝</span>Libre</button>';
  html += '</div>';

  // Présentation clinique (toujours visible)
  html += '<div class="card">';
  html += '<div class="card-title">📋 Présentation clinique</div>';
  html += '<div class="card-content"><p>' + escapeHtml(c.presentation) + '</p></div>';
  html += '</div>';

  html += '<div class="card">';
  html += '<div class="card-title">🩺 Examen clinique</div>';
  html += '<div class="card-content"><p>' + escapeHtml(c.examens) + '</p></div>';
  html += '</div>';

  // Section Canva (toujours visible)
  html += renderCanvaSection(c);

  // Mode spécifique
  if (currentMode === 'workflow') {
    html += renderWorkflowMode(c);
  } else if (currentMode === 'qcm') {
    html += renderQcmMode(c);
  } else if (currentMode === 'libre') {
    html += renderLibreMode(c);
  }

  container.innerHTML = html;
  attachCanvaListeners(c);
}

function switchMode(mode) {
  currentMode = mode;
  workflowStep = 0;
  renderCaseDetail();
}

/* ━━━ SECTION CANVA ━━━ */
function renderCanvaSection(c) {
  const urls = getCanvaUrls();
  const url = urls[c.id] || '';
  let html = '<div class="card">';
  html += '<div class="card-title">🎬 Iconographie échographique</div>';
  if (c.echo_focus) {
    html += '<div class="canva-help">📍 <strong>Focus :</strong> ' + escapeHtml(c.echo_focus) + '</div>';
  }
  html += '<div class="canva-url-row">';
  html += '<input type="url" class="canva-url-input" id="canvaInput-' + c.id + '" placeholder="Collez votre lien Canva ici (https://www.canva.com/design/.../view?embed)" value="' + escapeHtml(url) + '">';
  html += '<button class="canva-btn" onclick="saveCanvaUrl(' + c.id + ')">💾</button>';
  if (url) html += '<button class="canva-btn secondary" onclick="clearCanvaUrl(' + c.id + ')">✕</button>';
  html += '</div>';
  if (url) {
    html += '<div class="canva-iframe-wrap">';
    html += '<iframe src="' + escapeHtml(url) + '" allowfullscreen allow="fullscreen" loading="lazy" title="Echographie cas ' + c.id + '"></iframe>';
    html += '</div>';
  } else {
    html += '<div class="canva-empty-placeholder">';
    html += '<div class="icon">🎬</div>';
    html += '<div>Aucune iconographie liée à ce cas.<br><small>Collez l\'URL de votre Canva ci-dessus puis cliquez 💾</small></div>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function attachCanvaListeners(c) {
  const inp = document.getElementById('canvaInput-' + c.id);
  if (inp) {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveCanvaUrl(c.id); });
  }
}

function saveCanvaUrl(id) {
  const inp = document.getElementById('canvaInput-' + id);
  let url = inp.value.trim();
  // Auto-correction format Canva
  if (url && !url.includes('embed') && url.includes('canva.com/design/')) {
    if (url.includes('/view')) url = url.replace('/view', '/view?embed');
    else url += '/view?embed';
  }
  setCanvaUrl(id, url);
  showToast('💾 Lien Canva sauvegardé');
  renderCaseDetail();
}

function clearCanvaUrl(id) {
  if (!confirm('Supprimer le lien Canva ?')) return;
  setCanvaUrl(id, '');
  showToast('Lien supprimé');
  renderCaseDetail();
}

/* ━━━ MODE QCM ━━━ */
let qcmAnswered = false;
let qcmSelected = null;

function renderQcmMode(c) {
  qcmAnswered = false; qcmSelected = null;
  let html = '<div class="card">';
  html += '<div class="card-title">🧠 Question à choix multiple</div>';
  html += '<div class="card-content" style="margin-bottom:12px;"><p><strong>' + escapeHtml(c.qcm_question) + '</strong></p></div>';
  html += '<div class="qcm-options" id="qcmOptions">';
  c.qcm_options.forEach((opt, idx) => {
    const letter = String.fromCharCode(65 + idx);
    html += '<button class="qcm-option" data-qcm-idx="' + idx + '" onclick="selectQcm(' + idx + ')">';
    html += '<div class="qcm-option-letter">' + letter + '</div>';
    html += '<span>' + escapeHtml(opt.text) + '</span>';
    html += '</button>';
  });
  html += '</div>';
  html += '<button class="btn" id="qcmValidate" onclick="validateQcm()" style="margin-top:14px;" disabled>Valider la réponse</button>';
  html += '</div>';
  html += '<div id="qcmReveal"></div>';
  return html;
}

function selectQcm(idx) {
  if (qcmAnswered) return;
  qcmSelected = idx;
  document.querySelectorAll('[data-qcm-idx]').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.qcmIdx) === idx);
  });
  document.getElementById('qcmValidate').disabled = false;
}

function validateQcm() {
  if (qcmSelected === null) return;
  qcmAnswered = true;
  const c = CASES_DATA.find(x => x.id === currentCaseId);
  const correctIdx = c.qcm_options.findIndex(o => o.correct);
  const isCorrect = qcmSelected === correctIdx;

  // Marquer les options
  document.querySelectorAll('[data-qcm-idx]').forEach(b => {
    const idx = parseInt(b.dataset.qcmIdx);
    b.classList.remove('selected');
    if (idx === correctIdx) b.classList.add('correct');
    else if (idx === qcmSelected) b.classList.add('wrong');
    b.disabled = true;
  });

  document.getElementById('qcmValidate').style.display = 'none';

  // Révélation
  let reveal = '<div class="reveal-card' + (isCorrect ? '' : ' wrong-card') + '">';
  reveal += '<div class="reveal-title">' + (isCorrect ? '✅ Bonne réponse' : '❌ Réponse incorrecte') + '</div>';
  reveal += '<div class="reveal-content">';
  reveal += '<p><strong>Diagnostic correct :</strong> ' + escapeHtml(c.correct_dx) + '</p>';
  reveal += '<p style="margin-top:8px;">' + escapeHtml(c.qcm_explanation) + '</p>';
  reveal += '</div></div>';

  reveal += '<div class="card">';
  reveal += '<div class="card-title">💊 Prise en charge</div>';
  reveal += '<div class="card-content"><p>' + escapeHtml(c.pec) + '</p></div>';
  reveal += '</div>';

  if (c.pearls) {
    reveal += '<div class="card" style="background:linear-gradient(135deg, rgba(245,158,11,0.10), transparent);border-color:rgba(245,158,11,0.30);">';
    reveal += '<div class="card-title" style="color:var(--warning);">💎 Perle clinique</div>';
    reveal += '<div class="card-content"><p>' + escapeHtml(c.pearls) + '</p></div>';
    reveal += '</div>';
  }

  reveal += '<div class="btn-row">';
  reveal += '<button class="btn btn-secondary" onclick="goTo(\'list\'); renderCaseList();">← Retour</button>';
  reveal += '<button class="btn" onclick="nextCase()">Suivant →</button>';
  reveal += '</div>';

  document.getElementById('qcmReveal').innerHTML = reveal;
  setProgress(currentCaseId, isCorrect);
}

/* ━━━ MODE LIBRE ━━━ */
function renderLibreMode(c) {
  let html = '<div class="card">';
  html += '<div class="card-title">📝 Saisie libre</div>';
  html += '<div class="card-content"><p><strong>Quel est votre diagnostic et votre PEC ?</strong></p></div>';
  html += '<textarea class="free-input" id="libreInput" placeholder="Tapez votre diagnostic et votre prise en charge ici..."></textarea>';
  html += '<button class="btn" onclick="revealLibre()" style="margin-top:10px;">🔓 Révéler la réponse</button>';
  html += '</div>';
  html += '<div id="libreReveal"></div>';

}

function revealLibre() {
  const c = CASES_DATA.find(x => x.id === currentCaseId);
  let reveal = '<div class="reveal-card">';
  reveal += '<div class="reveal-title">📌 Diagnostic et PEC</div>';
  reveal += '<div class="reveal-content">';
  reveal += '<p><strong>Diagnostic :</strong> ' + escapeHtml(c.correct_dx) + '</p>';
  reveal += '<p style="margin-top:8px;"><strong>Explication :</strong> ' + escapeHtml(c.qcm_explanation) + '</p>';
  reveal += '</div></div>';
  reveal += '<div class="card">';
  reveal += '<div class="card-title">💊 Prise en charge</div>';
  reveal += '<div class="card-content"><p>' + escapeHtml(c.pec) + '</p></div>';
  reveal += '</div>';
  if (c.pearls) {
    reveal += '<div class="card" style="background:linear-gradient(135deg, rgba(245,158,11,0.10), transparent);border-color:rgba(245,158,11,0.30);">';
    reveal += '<div class="card-title" style="color:var(--warning);">💎 Perle clinique</div>';
    reveal += '<div class="card-content"><p>' + escapeHtml(c.pearls) + '</p></div>';
    reveal += '</div>';
  }
  reveal += '<div class="btn-row">';
  reveal += '<button class="btn btn-secondary" onclick="goTo(\'list\'); renderCaseList();">← Retour</button>';
  reveal += '<button class="btn" onclick="nextCase()">Suivant →</button>';
  reveal += '</div>';
  document.getElementById('libreReveal').innerHTML = reveal;
  setProgress(currentCaseId, true);
}

/* ━━━ MODE WORKFLOW (étape par étape) ━━━ */
const WORKFLOW_STEPS = [
  { title: '1. Anamnèse + examen', key: 'anamnese' },
  { title: '2. Iconographie écho', key: 'echo' },
  { title: '3. Diagnostic (QCM)', key: 'dx' },
  { title: '4. Prise en charge', key: 'pec' },
  { title: '5. Synthèse + perle', key: 'synthese' }
];

function renderWorkflowMode(c) {
  let html = '<div class="workflow-step-indicator">';
  WORKFLOW_STEPS.forEach((s, i) => {
    let cls = '';
    if (i < workflowStep) cls = 'done';
    else if (i === workflowStep) cls = 'active';
    html += '<div class="workflow-step-dot ' + cls + '"></div>';
  });
  html += '</div>';

  const step = WORKFLOW_STEPS[workflowStep];

  if (step.key === 'anamnese') {
    html += '<div class="card">';
    html += '<div class="card-title">📋 Étape 1 — Anamnèse + examen</div>';
    html += '<div class="card-content"><p>Lisez attentivement la présentation et l\'examen clinique ci-dessus. Que vous évoquent-ils ?</p></div>';
    html += '<button class="btn" onclick="workflowNext()" style="margin-top:10px;">Étape suivante →</button>';
    html += '</div>';
  } else if (step.key === 'echo') {
    html += '<div class="card">';
    html += '<div class="card-title">🎬 Étape 2 — Analyse de l\'écho</div>';
    html += '<div class="card-content"><p>Examinez l\'iconographie ci-dessus. Quels signes échographiques retenez-vous ?</p></div>';
    html += '<button class="btn" onclick="workflowNext()" style="margin-top:10px;">Étape suivante →</button>';
    html += '</div>';
  } else if (step.key === 'dx') {
    qcmAnswered = false; qcmSelected = null;
    html += '<div class="card">';
    html += '<div class="card-title">🧠 Étape 3 — Quel est votre diagnostic ?</div>';
    html += '<div class="card-content" style="margin-bottom:12px;"><p><strong>' + escapeHtml(c.qcm_question) + '</strong></p></div>';
    html += '<div class="qcm-options">';
    c.qcm_options.forEach((opt, idx) => {
      const letter = String.fromCharCode(65 + idx);
      html += '<button class="qcm-option" data-qcm-idx="' + idx + '" onclick="selectQcmWorkflow(' + idx + ')">';
      html += '<div class="qcm-option-letter">' + letter + '</div>';
      html += '<span>' + escapeHtml(opt.text) + '</span>';
      html += '</button>';
    });
    html += '</div>';
    html += '<button class="btn" id="qcmValidate" onclick="validateQcmWorkflow()" style="margin-top:14px;" disabled>Valider</button>';
    html += '</div>';
    html += '<div id="qcmReveal"></div>';
  } else if (step.key === 'pec') {
    html += '<div class="card">';
    html += '<div class="card-title">💊 Étape 4 — Prise en charge</div>';
    html += '<div class="card-content"><p>' + escapeHtml(c.pec) + '</p></div>';
    html += '<button class="btn" onclick="workflowNext()" style="margin-top:10px;">Voir la synthèse →</button>';
    html += '</div>';
  } else if (step.key === 'synthese') {
    html += '<div class="reveal-card">';
    html += '<div class="reveal-title">📌 Synthèse du cas</div>';
    html += '<div class="reveal-content">';
    html += '<p><strong>Diagnostic :</strong> ' + escapeHtml(c.correct_dx) + '</p>';
    html += '<p style="margin-top:8px;"><strong>PEC :</strong> ' + escapeHtml(c.pec) + '</p>';
    html += '</div></div>';
    if (c.pearls) {
      html += '<div class="card" style="background:linear-gradient(135deg, rgba(245,158,11,0.10), transparent);border-color:rgba(245,158,11,0.30);">';
      html += '<div class="card-title" style="color:var(--warning);">💎 Perle clinique</div>';
      html += '<div class="card-content"><p>' + escapeHtml(c.pearls) + '</p></div>';
      html += '</div>';
    }
    html += '<div class="btn-row">';
    html += '<button class="btn btn-secondary" onclick="goTo(\'list\'); renderCaseList();">← Retour</button>';
    html += '<button class="btn" onclick="nextCase()">Cas suivant →</button>';
    html += '</div>';
  }
  return html;
}

function selectQcmWorkflow(idx) {
  if (qcmAnswered) return;
  qcmSelected = idx;
  document.querySelectorAll('[data-qcm-idx]').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.qcmIdx) === idx);
  });
  document.getElementById('qcmValidate').disabled = false;
}

function validateQcmWorkflow() {
  if (qcmSelected === null) return;
  qcmAnswered = true;
  const c = CASES_DATA.find(x => x.id === currentCaseId);
  const correctIdx = c.qcm_options.findIndex(o => o.correct);
  const isCorrect = qcmSelected === correctIdx;
  document.querySelectorAll('[data-qcm-idx]').forEach(b => {
    const idx = parseInt(b.dataset.qcmIdx);
    b.classList.remove('selected');
    if (idx === correctIdx) b.classList.add('correct');
    else if (idx === qcmSelected) b.classList.add('wrong');
    b.disabled = true;
  });
  document.getElementById('qcmValidate').style.display = 'none';

  let reveal = '<div class="reveal-card' + (isCorrect ? '' : ' wrong-card') + '">';
  reveal += '<div class="reveal-title">' + (isCorrect ? '✅ Bonne réponse' : '❌ Réponse incorrecte') + '</div>';
  reveal += '<div class="reveal-content"><p>' + escapeHtml(c.qcm_explanation) + '</p></div>';
  reveal += '</div>';
  reveal += '<button class="btn" onclick="workflowNext()" style="margin-top:10px;">Voir la PEC →</button>';
  document.getElementById('qcmReveal').innerHTML = reveal;
  setProgress(currentCaseId, isCorrect);
}

function workflowNext() {
  workflowStep++;
  if (workflowStep >= WORKFLOW_STEPS.length) {
    workflowStep = WORKFLOW_STEPS.length - 1;
  }
  renderCaseDetail();
}

function nextCase() {
  const idx = CASES_DATA.findIndex(c => c.id === currentCaseId);
  const nextIdx = (idx + 1) % CASES_DATA.length;
  currentCaseId = CASES_DATA[nextIdx].id;
  workflowStep = 0;
  renderCaseDetail();
}

/* ━━━ INITIALISATION ━━━ */
function init() {
  initPathoFilter();
  initFilters();
  renderCaseList();
}
/* init() sera appelé à la fin du fichier après que toutes les fonctions soient définies */


/* Storage URL Canva par cas */
const CANVA_URLS_KEY = 'cardioecho_cases_canva';
const PROGRESS_KEY = 'cardioecho_cases_progress';

function getCanvaUrls() { return JSON.parse(localStorage.getItem(CANVA_URLS_KEY) || '{}'); }
function setCanvaUrl(id, url) {
  const u = getCanvaUrls();
  if (url) u[id] = url; else delete u[id];
  localStorage.setItem(CANVA_URLS_KEY, JSON.stringify(u));
}
function getProgress() { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); }
function setProgress(id, success) {
  const p = getProgress();
  p[id] = { completed: true, success: !!success, date: new Date().toISOString() };
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}

function showToast(msg, isError) {
  const e = document.querySelector('.toast');
  if (e) e.remove();
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 1800);
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* Navigation */
let currentScreen = 'list';
let currentCaseId = null;
let currentMode = 'workflow'; // workflow | qcm | libre
let workflowStep = 0;

function goTo(scr) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + scr).classList.add('active');
  currentScreen = scr;
  window.scrollTo(0, 0);
}

function onBack() {
  if (currentScreen === 'case') {
    goTo('list');
    renderCaseList();
  } else {
    // Retour à l'index principal si présent (page parente)
    if (window.history.length > 1) window.history.back();
    else window.location.href = '../index.html';
  }
}

/* ━━━ DÉMARRAGE FINAL — toutes les fonctions sont maintenant définies ━━━ */
init();
